name: Validate skills

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show GitHub CLI version
        run: gh --version

      - name: Validate skill package
        run: gh skill publish --dry-run
